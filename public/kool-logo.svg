<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <!-- Black background -->
  <rect width="400" height="200" fill="#0A0A0A"/>
  
  <!-- "kool" text -->
  <text
    x="60"
    y="138"
    font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="110"
    font-weight="900"
    fill="white"
    letter-spacing="-3"
  >kool</text>
  
  <!-- Heart rotated 90° (tip pointing right), baseline-aligned -->
  <!-- Heart center at x=338, bottom tip at y=138 (same as text baseline) -->
  <!-- Heart rotated 90deg clockwise: tip points right -->
  <g transform="translate(338, 118) rotate(90)">
    <path
      d="M0 19 C0 19 -11 11 -11 4.5 C-11 1.5 -8.5 -1 -5.5 -1 C-3.2 -1 -1.2 0.4 0 2.4 C1.2 0.4 3.2 -1 5.5 -1 C8.5 -1 11 1.5 11 4.5 C11 11 0 19 0 19 Z"
      fill="#D90000"
      transform="scale(1.4)"
    />
  </g>
</svg>
